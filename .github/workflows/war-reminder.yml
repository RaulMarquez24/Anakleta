name: Recordatorio de guerra (Discord)

# Cada hora hace POST a /api/war-reminder. El endpoint (1) captura la guerra
# actual en Supabase con todo el detalle por ataque —objetivo, espejo, duración—
# para no perderla cuando termine antes del snapshot de 6h; y (2) decide si toca
# avisar en Discord (escalado ≤6h/≤3/2/1h, sin repetir tramos).
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/war-reminder
        run: |
          curl --fail-with-body -sS -X POST \
            "https://anakleta.vercel.app/api/war-reminder" \
            -H "Authorization: Bearer $CRON_SECRET"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

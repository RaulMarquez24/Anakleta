name: Desplegar bot (Fly.io)

# Cada push a main que toque bot/ redespliega el bot en Fly.io con un build
# limpio en el remote builder de Fly (no hace falta Docker local). Así los
# cambios del bot llegan solos, sin `fly deploy` manual.
on:
  push:
    branches: [main]
    paths:
      - "bot/**"
      - ".github/workflows/bot-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # El bot ahora sirve HTTP (landing + health): la app necesita IP pública
      # para que <app>.fly.dev resuelva. Idempotente (si ya la tiene, no pasa nada).
      - name: Asegurar IP pública
        working-directory: bot
        run: |
          flyctl ips allocate-v4 --shared --yes || true
          flyctl ips allocate-v6 --yes || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: fly deploy
        working-directory: bot
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
